  // Vagthund: hvis siden stadig viser "Indlæser..." efter 5 sekunder,
  // så er noget galt — vis præcis hvad, i stedet for at hænge for evigt.
  window.addEventListener('load', function () {
    setTimeout(function () {
      var rootEl = document.getElementById('root');
      if (rootEl && rootEl.textContent.indexOf('Indlæser') !== -1) {
        var missing = [];
        if (typeof React === 'undefined') missing.push('React');
        if (typeof ReactDOM === 'undefined') missing.push('ReactDOM');
        if (typeof Babel === 'undefined') missing.push('Babel');
        var msg = missing.length
          ? 'Kunne ikke indlæse: ' + missing.join(', ') + '. Tjek din internetforbindelse, eller at intet (fx en adblocker) blokerer unpkg.com.'
          : 'Siden loader stadig efter 5 sekunder. Åbn browserens konsol (F12) for at se en fejlbesked, og send den til Claude.';
        rootEl.innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#050510;color:#ff6b6b;font-family:monospace;padding:24px;text-align:center;">' + msg + '</div>';

/* ============================================================
   PURE HELPERS
   ============================================================ */
function todayStr() {
  return new Date().toISOString().slice(0, 10);
}

function expToNext(level) {
  let exp = EXP_CONFIG.base * Math.pow(level, EXP_CONFIG.exponent);
  EXP_CONFIG.tierMultipliers.forEach(t => { if (level >= t.level) exp *= t.mult; });
  return Math.max(50, Math.round(exp / 10) * 10);
}

function getRankInfo(level) {
  return RANKS.find(r => level >= r.min && level <= r.max) || RANKS[RANKS.length - 1];
}

function computeClass(stats) {
  const entries = Object.entries(stats);
  const values = entries.map(([, v]) => v);
  const max = Math.max(...values);
  const min = Math.min(...values);
  if (max - min <= 8) return 'Skyggemonark';
  const top = entries.find(([, v]) => v === max)[0];
  const map = { STR: 'Berserker', AGI: 'Snigmorder', VIT: 'Ridder', INT: 'Troldmand', PER: 'Jæger' };
  return map[top];
}

function isQuestComplete(p) {
  return QUEST_ITEMS.every(q => p.dailyProgress[q.key] >= p.dailyGoals[q.key]);
}

function applyDailyReset(p) {
  const today = todayStr();
  if (p.questDate === today) return p;
  const wasComplete = isQuestComplete(p);
  const next = { ...p };
  if (wasComplete) {
    next.streak = (p.streak || 0) + 1;
  } else if (p.questDate) {
    next.streak = 0;
    next.penaltyZone = true;
  }
  next.questDate = today;
  next.dailyProgress = { pushups: 0, situps: 0, squats: 0, runKm: 0 };
  next.dailyRewardClaimed = false;
  return next;
}

function applyExpGain(p, amount) {
  let level = p.level;
  let exp = p.exp + amount;
  const levelUps = [];
  let needed = expToNext(level);
  while (exp >= needed) {
    exp -= needed;
    level += 1;
    levelUps.push(level);
    needed = expToNext(level);
  }
  const jobChangeTriggered = level >= 40 && !p.jobChangeSeen && levelUps.length > 0;
  return { player: { ...p, level, exp }, levelUps, jobChangeTriggered };
}

function evaluateAchievements(p) {
  const unlocked = [...p.titles];
  const newlyUnlocked = [];
  ACHIEVEMENTS.forEach(a => {
    if (!unlocked.includes(a.id) && a.condition(p)) {
      unlocked.push(a.id);
      newlyUnlocked.push(a);
    }
  });
  return { titles: unlocked, newlyUnlocked };
}

function parseWorkoutText(raw) {
  const text = raw.toLowerCase();
  const km = text.match(/(\d+[.,]?\d*)\s?km/i);
  const min = text.match(/(\d+)\s?(min|minut\w*)/i);
  const reps = text.match(/(\d+)\s?(reps|gentagelser|stk)\b/i);
  const kmVal = km ? parseFloat(km[1].replace(',', '.')) : 0;
  const minVal = min ? parseInt(min[1], 10) : 0;
  const repsVal = reps ? parseInt(reps[1], 10) : 0;

  const matchedStats = new Set();
  Object.entries(KEYWORDS).forEach(([stat, words]) => {
    if (words.some(w => text.includes(w))) matchedStats.add(stat);
  });
  const hasRunWord = RUN_WORDS.some(w => text.includes(w));
  if (hasRunWord) matchedStats.add(kmVal >= 5 ? 'VIT' : 'AGI');

  if (matchedStats.size === 0) return null;

  const effort = minVal + kmVal * 6 + repsVal * 0.3;
  const baseExp = 25 + effort * 3;
  const expGained = Math.max(20, Math.round(baseExp / 5) * 5);
  const perStat = Math.min(6, Math.max(1, Math.round(1 + effort / 25)));

  const statsGained = {};
  matchedStats.forEach(s => { statsGained[s] = perStat; });

  return { statsGained, expGained };
}

const STORAGE_KEY = 'sololevel_player_v1';

// localStorage is synchronous and lives on this device/browser only —
// no network round-trip, no external dependency, works offline.
function loadPlayer() {
  const fallback = DEFAULT_PLAYER();
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return fallback;
    const parsed = JSON.parse(raw);
    const merged = {
      ...fallback,
      ...parsed,
      stats: { ...fallback.stats, ...(parsed.stats || {}) },
      dailyProgress: { ...fallback.dailyProgress, ...(parsed.dailyProgress || {}) },
      dailyGoals: { ...fallback.dailyGoals, ...(parsed.dailyGoals || {}) },
      titles: parsed.titles || [],
      history: parsed.history || [],
    };
    return applyDailyReset(merged);
  } catch (e) {
    return fallback;
  }
}

function savePlayer(player) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(player));
  } catch (e) {
    // storage full or unavailable (e.g. private browsing) — fail silently
  }
}

/* ============================================================
   RADAR CHART — hand-rolled SVG pentagon, no chart library needed
   ============================================================ */
function RadarChartSVG({ data, max }) {
  const size = 260;
  const cx = size / 2, cy = size / 2;
  const radius = 88;
  const angleStep = (Math.PI * 2) / data.length;

  function pointFor(value, i) {
    const angle = -Math.PI / 2 + i * angleStep;
    const r = Math.max(0, Math.min(1, value / max)) * radius;
    return [cx + r * Math.cos(angle), cy + r * Math.sin(angle)];
  }

  const levels = [0.25, 0.5, 0.75, 1];
  const dataPoints = data.map((d, i) => pointFor(d.value, i));
  const dataPath = dataPoints.map(p => p.join(',')).join(' ');

  return (
    <svg viewBox={`0 0 ${size} ${size}`} width="100%" height={size}>
      {levels.map((lvl, gi) => {
        const pts = data.map((_, i) => pointFor(max * lvl, i).join(',')).join(' ');
        return <polygon key={gi} points={pts} fill="none" stroke="#1c2947" strokeWidth="1" />;
      })}
      {data.map((d, i) => {
        const [x, y] = pointFor(max, i);
        return <line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke="#1c2947" strokeWidth="1" />;
      })}
      <polygon points={dataPath} fill="#00d2ff" fillOpacity="0.35" stroke="#00d2ff" strokeWidth="2" />
      {data.map((d, i) => {
        const [lx, ly] = pointFor(max * 1.24, i);
        return (
          <text key={i} x={lx} y={ly} fill="#9fb2d9" fontSize="12" fontFamily="'Space Mono', monospace" textAnchor="middle" dominantBaseline="middle">
            {d.stat}
          </text>
        );
      })}
    </svg>
  );
}

      </div>

      {exercise.mode === 'reps' && (
        <div className="flex items-center gap-4 mb-4 flex-wrap">
          <label className="font-mono text-2xs flex items-center gap-2" style={{ color: '#5b6b8c' }}>
            Sæt
            <input
              type="number" inputMode="numeric" min={1} max={20} value={sets}
              onChange={e => setSets(Math.max(1, parseInt(e.target.value, 10) || 1))}
              className="w-14 font-mono text-sm bg-transparent outline-none"
              style={{ color: '#e8f4ff', borderBottom: '1px solid #1c2947' }}
            />
          </label>
          <label className="font-mono text-2xs flex items-center gap-2" style={{ color: '#5b6b8c' }}>
            Reps
            <input
              type="number" inputMode="numeric" min={1} max={100} value={reps}
              onChange={e => setReps(Math.max(1, parseInt(e.target.value, 10) || 1))}
              className="w-14 font-mono text-sm bg-transparent outline-none"
              style={{ color: '#e8f4ff', borderBottom: '1px solid #1c2947' }}
            />
          </label>
        </div>
      )}

      {exercise.mode === 'duration' && (
        <div className="flex items-center gap-3 mb-4">
          <input type="range" min={5} max={maxMinutes} step={5} value={minutes} onChange={e => setMinutes(parseInt(e.target.value, 10))} className="flex-1" />
          <span className="font-mono text-sm w-16 text-right">{minutes} min</span>
        </div>
      )}

      {exercise.mode === 'distance' && (
        <div className="flex items-center gap-3 mb-4">
          <input type="range" min={0.5} max={21} step={0.5} value={km} onChange={e => setKm(parseFloat(e.target.value))} className="flex-1" />
          <span className="font-mono text-sm w-16 text-right">{km} km</span>
        </div>
      )}

      <div className="flex items-center justify-between flex-wrap gap-2">
        <span className="font-mono text-2xs flex items-center gap-1.5 flex-wrap" style={{ color: meta.color }}>
          <meta.icon size={13} /> Træner: {meta.label}
          {exercise.questLink && <span style={{ color: '#4ade80' }}>· tæller i Dagens Quest</span>}
        </span>
        <button
          onClick={submit}
          className="text-xs font-bold uppercase tracking-widest px-4 py-2.5 rounded-sm"
          style={{ border: '1px solid #3a7bd5', color: '#00d2ff', background: 'transparent' }}
        >
          Tilføj
        </button>
      </div>
    </div>
  );
}

function HistoryTab({ player }) {
  return (
    <div className="space-y-4 pt-1">
      <SystemPanel>
        <p className="text-sm font-bold uppercase tracking-widest mb-3">Titler</p>
        <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
          {ACHIEVEMENTS.map(a => {
            const unlocked = player.titles.includes(a.id);
            return (
              <div
                key={a.id}
                className="flex items-center gap-2.5 px-3 py-2 rounded-sm"
                style={{ background: unlocked ? 'rgba(255,209,102,0.08)' : 'rgba(255,255,255,0.02)', border: `1px solid ${unlocked ? '#ffd166' : '#1c2947'}`, opacity: unlocked ? 1 : 0.45 }}
              >
                <IconTrophy size={16} style={{ color: unlocked ? '#ffd166' : '#5b6b8c' }} />
                <div>
                  <p className="text-xs font-bold uppercase" style={{ color: unlocked ? '#ffe9b8' : '#7c8db5' }}>{a.title}</p>
                  <p className="font-mono text-3xs" style={{ color: '#5b6b8c' }}>{a.desc}</p>
                </div>
              </div>
            );
          })}
        </div>
      </SystemPanel>

      <SystemPanel>
        <p className="text-sm font-bold uppercase tracking-widest mb-3">Historik</p>
        {player.history.length === 0 ? (
          <p className="font-mono text-xs" style={{ color: '#5b6b8c' }}>Ingen træning logget endnu. Start i "Log Træning".</p>
        ) : (
          <div className="space-y-2 max-h-96 overflow-y-auto pr-1">
            {player.history.map(h => (
              <div key={h.id} className="flex items-center justify-between px-3 py-2 rounded-sm" style={{ background: 'rgba(255,255,255,0.03)' }}>
                <div>
                  <p className="text-xs font-semibold" style={{ color: '#e8f4ff' }}>{h.label}</p>
                  <p className="font-mono text-3xs" style={{ color: '#5b6b8c' }}>
                    {new Date(h.date).toLocaleDateString('da-DK', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' })}
                  </p>
                </div>
                <div className="text-right">
                  <p className="font-mono text-xs" style={{ color: '#00d2ff' }}>+{h.exp} EXP</p>
                  <p className="font-mono text-3xs" style={{ color: '#5b6b8c' }}>
                    {Object.entries(h.stats).map(([k, v]) => `${k}+${v}`).join(' ')}
                  </p>
                </div>
              </div>
            ))}
          </div>
        )}
      </SystemPanel>
    </div>
  );
}

/* ============================================================
   MODALS
   ============================================================ */
function ModalShell({ eyebrow, tone = '#00d2ff', children }) {
  return (
    <SystemPanel style={{ overflow: 'hidden' }}>
      <div className="absolute left-0 right-0 sl-scanline" style={{ background: `linear-gradient(90deg, transparent, ${tone}, transparent)`, top: 0, height: 1 }} />
      <p className="font-mono text-2xs tracking-ultra mb-2" style={{ color: tone }}>{eyebrow}</p>
      {children}
    </SystemPanel>
  );
}

function ModalCloseBtn({ onClose }) {
  return (
    <button onClick={onClose} className="text-xs font-bold uppercase tracking-widest px-4 py-2 w-full rounded-sm" style={{ background: 'linear-gradient(90deg,#00d2ff,#3a7bd5)', color: '#00131a' }}>
      Fortsæt
    </button>
  );
}

function RecapModal({ payload, onClose }) {
  return (
    <ModalShell eyebrow="SYSTEM · TRÆNING EVALUERET">
      <p className="text-lg font-bold uppercase mb-1">{payload.label}</p>
      <p className="font-mono text-2xl mb-3" style={{ color: '#00d2ff' }}>+{payload.exp} EXP</p>
      <div className="flex flex-wrap gap-2 mb-4">
        {Object.entries(payload.stats).map(([k, v]) => (
          <span key={k} className="font-mono text-xs px-2 py-1 rounded-sm" style={{ background: 'rgba(255,255,255,0.05)', color: STAT_META[k].color }}>{k} +{v}</span>
        ))}
      </div>
      {payload.penaltyResolved && <p className="font-mono text-xs mb-3" style={{ color: '#4ade80' }}>Penalty Zone ophævet.</p>}
      <ModalCloseBtn onClose={onClose} />
    </ModalShell>
  );
}

function LevelUpModal({ payload, onClose }) {
  return (
    <ModalShell eyebrow="SYSTEM MESSAGE">
      <p className="text-2xl font-bold uppercase mb-1" style={{ color: '#e8f4ff', textShadow: '0 0 20px rgba(0,210,255,0.6)' }}>Du er steget i level!</p>
      <p className="font-mono text-sm mb-4" style={{ color: '#9fb2d9' }}>Level {payload.from} → <span style={{ color: '#00d2ff' }}>{payload.to}</span></p>
      <ModalCloseBtn onClose={onClose} />
    </ModalShell>
  );
}

function QuestModal({ payload, onClose }) {
  return (
    <ModalShell eyebrow="SYSTEM · DAGENS QUEST">
      <p className="text-xl font-bold uppercase mb-1">Fuldført!</p>
      <p className="font-mono text-sm mb-1" style={{ color: '#9fb2d9' }}>"Den Svages Mod" er gennemført.</p>
      <p className="font-mono text-2xl mb-4" style={{ color: '#00d2ff' }}>+{payload.bonus} EXP</p>
      <ModalCloseBtn onClose={onClose} />
    </ModalShell>
  );
}

function JobChangeModal({ payload, onClose }) {
  const info = CLASS_INFO[payload.cls];
  return (
    <ModalShell eyebrow="SYSTEM · JOB CHANGE QUEST" tone="#c792ff">
      <p className="font-mono text-xs mb-2" style={{ color: '#9fb2d9' }}>Level 40 nået. Baseret på dine dominerende evner tildeles klassen:</p>
      <p className="text-2xl font-bold uppercase mb-2" style={{ color: '#c792ff', textShadow: '0 0 20px rgba(199,146,255,0.6)' }}>{payload.cls}</p>
      <p className="font-mono text-xs mb-4" style={{ color: '#7c8db5' }}>{info.desc}</p>
      <ModalCloseBtn onClose={onClose} />
    </ModalShell>
  );
}

function ModalRenderer({ modal, onClose }) {
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{ background: 'rgba(2,4,12,0.8)', backdropFilter: 'blur(4px)' }} onClick={onClose}>
      <div className="sl-modal-in w-full" style={{ maxWidth: 384 }} onClick={e => e.stopPropagation()}>
        {modal.type === 'recap' && <RecapModal payload={modal.payload} onClose={onClose} />}
        {modal.type === 'levelup' && <LevelUpModal payload={modal.payload} onClose={onClose} />}
        {modal.type === 'quest' && <QuestModal payload={modal.payload} onClose={onClose} />}
        {modal.type === 'jobchange' && <JobChangeModal payload={modal.payload} onClose={onClose} />}
      </div>
    </div>
  );
}

/* ============================================================
   APP
   ============================================================ */
function App() {
  const [player, setPlayer] = useState(loadPlayer);
  const [activeTab, setActiveTab] = useState('status');
  const [modalQueue, setModalQueue] = useState([]);
  const [toast, setToast] = useState(null);
  const [resetArmed, setResetArmed] = useState(false);
  const toastTimer = useRef(null);
  const resetTimer = useRef(null);

  useEffect(() => {
    savePlayer(player);
  }, [player]);

  function showToast(msg) {
    setToast(msg);
    clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(null), 4000);
  }

  function handleResetClick() {
    if (!resetArmed) {
      setResetArmed(true);
      clearTimeout(resetTimer.current);
      resetTimer.current = setTimeout(() => setResetArmed(false), 4000);
    } else {
      clearTimeout(resetTimer.current);
      setPlayer(DEFAULT_PLAYER());
      setModalQueue([]);
      setResetArmed(false);
      showToast('Fremskridt nulstillet');
    }
  }

  function onRename(name) {
    setPlayer(p => ({ ...p, name }));
  }

  function finalizeExpGrant(baseWorking, expAmount, prevLevel) {
    const { player: afterExp, levelUps, jobChangeTriggered } = applyExpGain(baseWorking, expAmount);
    let working = afterExp;
    let penaltyResolved = false;
    if (working.penaltyZone) { working = { ...working, penaltyZone: false }; penaltyResolved = true; }
    if (jobChangeTriggered) working = { ...working, jobChangeSeen: true, class: computeClass(working.stats) };
    const { titles, newlyUnlocked } = evaluateAchievements(working);
    working = { ...working, titles };
    const modals = [];
    if (levelUps.length) modals.push({ type: 'levelup', payload: { from: prevLevel, to: working.level } });
    if (jobChangeTriggered) modals.push({ type: 'jobchange', payload: { cls: working.class } });
    return { working, modals, newlyUnlocked, penaltyResolved };
  }

  function applyWorkoutResult(parsed, label, questBump) {
    const stats = { ...player.stats };
    Object.entries(parsed.statsGained).forEach(([k, v]) => { stats[k] = (stats[k] || 0) + v; });
    const base = { ...player, stats };
    const prevLevel = player.level;

    const step1 = finalizeExpGrant(base, parsed.expGained, prevLevel);
    let working = step1.working;
    let modals = [...step1.modals];
    let newlyUnlocked = [...step1.newlyUnlocked];
    let penaltyResolved = step1.penaltyResolved;

    if (questBump && questBump.key && questBump.delta > 0) {
      const isDistance = questBump.key === 'runKm';
      const rawNew = (working.dailyProgress[questBump.key] || 0) + questBump.delta;
      const newVal = isDistance ? Math.round(rawNew * 10) / 10 : Math.round(rawNew);
      const afterBump = { ...working, dailyProgress: { ...working.dailyProgress, [questBump.key]: newVal } };

      if (isQuestComplete(afterBump) && !afterBump.dailyRewardClaimed) {
        const bonus = Math.round(300 * (1 + Math.min(afterBump.streak, 20) * 0.03));
        const step2 = finalizeExpGrant({ ...afterBump, dailyRewardClaimed: true }, bonus, working.level);
        working = step2.working;
        modals = [...modals, { type: 'quest', payload: { bonus } }, ...step2.modals];
        newlyUnlocked = [...newlyUnlocked, ...step2.newlyUnlocked];
        if (step2.penaltyResolved) penaltyResolved = true;
      } else {
        working = afterBump;
      }
    }

    const finalWorking = {
      ...working,
      history: [{ id: Date.now(), date: new Date().toISOString(), label, exp: parsed.expGained, stats: parsed.statsGained }, ...player.history].slice(0, 60),
    };
    setPlayer(finalWorking);
    setModalQueue(q => [...q, { type: 'recap', payload: { exp: parsed.expGained, stats: parsed.statsGained, label, penaltyResolved } }, ...modals]);
    if (newlyUnlocked.length) showToast(`Titel opnået: ${newlyUnlocked[0].title}`);
  }

  function handleLogText(rawText) {
    const parsed = parseWorkoutText(rawText);
    if (!parsed) return false;
    applyWorkoutResult(parsed, rawText.trim());
    return true;
  }

  function handleLogExercise({ label, stat, opts, questLink, questDelta }) {
    let expGained, gain;
    if (opts.minutes != null) {
      const m = Math.max(5, opts.minutes);
      expGained = Math.max(20, Math.round((20 + m * 3) / 5) * 5);
      gain = Math.min(6, Math.max(1, Math.round(1 + m / 20)));
    } else if (opts.km != null) {
      const kmVal = Math.max(0.1, opts.km);
      const effort = kmVal * 6;
      expGained = Math.max(20, Math.round((25 + effort * 3) / 5) * 5);
      gain = Math.min(6, Math.max(1, Math.round(1 + effort / 25)));
    } else {
      const sets = Math.max(1, opts.sets || 1);
      const reps = Math.max(1, opts.reps || 1);
      const effortScore = sets * reps;
      expGained = Math.max(20, Math.round((20 + effortScore * 0.8) / 5) * 5);
      gain = Math.min(6, Math.max(1, Math.round(1 + effortScore / 40)));
    }
    applyWorkoutResult(
      { expGained, statsGained: { [stat]: gain } },
      label,
      questLink ? { key: questLink, delta: questDelta } : null,
    );
  }

  function updateQuestProgress(key, rawValue) {
    const value = Number.isFinite(rawValue) ? rawValue : 0;
    const clamped = Math.max(0, key === 'runKm' ? Math.round(value * 10) / 10 : Math.round(value));
    const dailyProgress = { ...player.dailyProgress, [key]: clamped };
    const base = { ...player, dailyProgress };
    const complete = isQuestComplete(base);

    if (complete && !player.dailyRewardClaimed) {
      const bonus = Math.round(300 * (1 + Math.min(player.streak, 20) * 0.03));
      const prevLevel = player.level;
      const { working, modals, newlyUnlocked } = finalizeExpGrant({ ...base, dailyRewardClaimed: true }, bonus, prevLevel);
      setPlayer(working);
      setModalQueue(q => [...q, { type: 'quest', payload: { bonus } }, ...modals]);
      if (newlyUnlocked.length) showToast(`Titel opnået: ${newlyUnlocked[0].title}`);
    } else {
      setPlayer(base);
    }
  }

  function updateQuestGoal(key, newGoal) {
    const min = key === 'runKm' ? 1 : 5;
    setPlayer(p => ({ ...p, dailyGoals: { ...p.dailyGoals, [key]: Math.max(min, Math.round(newGoal)) } }));
  }

  function acceptPenalty() {
    const loss = Math.round(player.exp * 0.05);
    setPlayer(p => ({ ...p, exp: Math.max(0, p.exp - loss), penaltyZone: false }));
    showToast(`Straf accepteret: -${loss} EXP`);
  }

  const rank = getRankInfo(player.level);
  const needed = expToNext(player.level);
  const currentModal = modalQueue[0] || null;

  return (
    <div className="min-h-screen w-full relative overflow-x-hidden" style={{ background: '#050510', color: '#e8f4ff', fontFamily: "'Rajdhani', sans-serif" }}>
      <BackgroundFX />
      {player.penaltyZone && <PenaltyBanner onGoLog={() => setActiveTab('log')} onAccept={acceptPenalty} />}
      <Header player={player} onRename={onRename} resetArmed={resetArmed} onResetClick={handleResetClick} />
      <TabBar active={activeTab} setActive={setActiveTab} penalty={player.penaltyZone} />
      <main className="relative z-10 max-w-5xl mx-auto px-4 pb-16">
        {activeTab === 'status' && <StatusTab player={player} rank={rank} needed={needed} />}
        {activeTab === 'quest' && <QuestTab player={player} onUpdate={updateQuestProgress} onScale={updateQuestGoal} />}
        {activeTab === 'log' && <LogTab onSubmitText={handleLogText} onLogExercise={handleLogExercise} />}
        {activeTab === 'history' && <HistoryTab player={player} />}
      </main>
      {toast && <Toast message={toast} />}
      {currentModal && <ModalRenderer modal={currentModal} onClose={() => setModalQueue(q => q.slice(1))} />}
    </div>
  );
}

function showFatalError(err) {
  const rootEl = document.getElementById('root');
  if (!rootEl) return;
  const message = (err && err.message) ? err.message : String(err);
  rootEl.innerHTML =
    '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#050510;color:#ff6b6b;font-family:monospace;padding:24px;text-align:center;white-space:pre-wrap;">Der opstod en fejl:\n\n' +
    message +
    '\n\nSend denne besked til Claude.</div>';
}

window.addEventListener('error', function (e) { showFatalError(e.error || e.message); });
window.addEventListener('unhandledrejection', function (e) { showFatalError(e.reason); });

try {
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
} catch (err) {
  showFatalError(err);
}

</script>
</body>
</html>
